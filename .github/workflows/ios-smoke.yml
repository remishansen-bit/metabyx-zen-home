name: iOS Capacitor smoke test

on:
  pull_request:
    paths:
      - "capacitor.config.ts"
      - "package.json"
      - "bun.lock"
      - "src/**"
      - "public/**"
      - "ios/**"
      - ".github/workflows/ios-smoke.yml"

jobs:
  ios-build:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - name: Install deps
        run: bun install --frozen-lockfile

      - name: Build web bundle
        run: bun run build

      - name: Ensure iOS platform exists
        run: |
          if [ ! -d "ios" ]; then
            bunx cap add ios
          fi

      - name: Capacitor sync
        run: bunx cap sync ios

      - name: Capacitor doctor
        run: bunx cap doctor

      - name: Pod install
        working-directory: ios/App
        run: pod install --repo-update

      - name: xcodebuild (no signing, simulator)
        working-directory: ios/App
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build