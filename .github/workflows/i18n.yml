name: i18n

on:
  pull_request:
  push:
    branches: [main]

jobs:
  vitest-i18n:
    name: i18n parity & leak suite
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install deps
        run: bun install --frozen-lockfile
      - name: Run i18n parity & leak tests
        run: bun run test:i18n
      - name: Run full vitest suite
        run: bun run test